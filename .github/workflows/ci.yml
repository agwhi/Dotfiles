name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint scripts and recipes
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install checkers
        run: brew install shellcheck just

      - name: Shellcheck all shell scripts
        run: shellcheck --severity=warning -x scripts/*.sh system/shell/path.sh

      - name: Justfile recipes parse
        run: |
          just --list > /dev/null
          just --justfile system/global-justfile --list > /dev/null

      - name: Doctor compiles and reports
        run: |
          python3 -m py_compile scripts/doctor.py
          ./scripts/doctor.py --json | python3 -m json.tool > /dev/null

      - name: Doctor parser tests
        run: python3 scripts/doctor_test.py

      - name: PATH contract is POSIX and idempotent
        run: |
          sh -n system/shell/path.sh
          A=$(sh -c '. ./system/shell/path.sh && echo "$PATH"')
          B=$(sh -c '. ./system/shell/path.sh && . ./system/shell/path.sh && echo "$PATH"')
          test "$A" = "$B"

      - name: Zsh startup files parse
        run: |
          zsh -n system/zsh/.zshenv
          zsh -n system/zsh/.zprofile
          zsh -n system/zsh/.zshrc

  docs-and-secrets:
    name: Markdown lint and secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            !backups/**
            !reports/**

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
