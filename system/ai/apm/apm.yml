# This manifest declares the shared Global AI Baseline. It is not approval to
# run install, update, prune, or live target-file deployment.
name: dotfiles-ai-baseline
version: 0.1.0
description: Shared Global AI Baseline for this dotfiles repo.

# Pin harness targets explicitly. Editor targets can be added only through a
# later editor-specific ADR; Pi has no confirmed APM target in the current CLI.
targets:
  - codex
  - claude
  - opencode

# The only intended baseline skill workflow is grill-with-docs. Its public
# v1.0.1 wrapper invokes grilling and domain-modeling, so pin those public
# dependency skills too.
# using-superpowers is intentionally excluded.
dependencies:
  apm:
    - mattpocock/skills/skills/engineering/grill-with-docs#v1.0.1
    - mattpocock/skills/skills/productivity/grilling#v1.0.1
    - mattpocock/skills/skills/engineering/domain-modeling#v1.0.1
